#worker MPM
# StartServers: initial number of server processes to start
# MaxRequestWorkers: maximum number of simultaneous client connections
# MinSpareThreads: minimum number of worker threads which are kept spare
# MaxSpareThreads: maximum number of worker threads which are kept spare
# ThreadsPerChild: constant number of worker threads in each server process
# MaxRequestsPerChild: maximum number of requests a server process serves
<IfModule mpm_worker_module>
    #Defines the max number of processes allowed
    ServerLimit            64
    ThreadLimit            64

    StartServers           16
    # Increased ceiling to prevent 503s during tile spikes
    MaxRequestWorkers      2048

    ## Keeping spare threads ready for burst traffic
    MinSpareThreads        128
    MaxSpareThreads        512
    ThreadsPerChild        64

    # Recycle processes to prevent memory fragmentation
    MaxConnectionsPerChild 10000
</IfModule>
